services:
  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  bot:
    build: .
    command: python -m app.bot.main
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  usage-worker:
    build: .
    command: python -m app.workers.usage_worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bluepanel
      POSTGRES_USER: bluepanel
      POSTGRES_PASSWORD: bluepanel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
